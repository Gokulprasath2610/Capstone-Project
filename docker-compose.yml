version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: loan-db
    environment:
      POSTGRES_USER: loan_app
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: loan_approval
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan_app -d loan_approval"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan_network

  # FastAPI Backend Service
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: fastapi-service
    container_name: loan-api
    environment:
      DATABASE_URL: postgresql://loan_app:secure_password_123@db:5432/loan_approval
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - loan_network
    volumes:
      - ./logs:/app/logs

  # Streamlit Frontend
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: streamlit-ui
    container_name: loan-ui
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - loan_network
    volumes:
      - ./logs:/app/logs

  # PgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: loan-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - loan_network

volumes:
  postgres_data:
    driver: local

networks:
  loan_network:
    driver: bridge
